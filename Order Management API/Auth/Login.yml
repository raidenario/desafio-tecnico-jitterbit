info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test(\"Status code is 200\", function () {\r

        \    expect(res.getStatus()).to.equal(200);\r

        });\r

        var jsonData = res.getBody();\r

        if (jsonData.token) {\r

        \    bru.setEnvVar(\"jwt_token\", jsonData.token);\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
