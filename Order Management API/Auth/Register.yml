info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test(\"Status code is 201\", function () {\r

        \    expect(res.getStatus()).to.equal(201);\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
