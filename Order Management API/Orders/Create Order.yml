info:
  name: Create Order
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/order"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "numeroPedido": "v10089015vdb-01",
        "valorTotal": 10000,
        "dataCriacao": "2023-07-19T12:24:11.5299601+00:00",
        "items": [
          {
            "idItem": "2434",
            "quantidadeItem": 1,
            "valorItem": 1000
          }
        ]
      }
  auth:
    type: bearer
    token: "{{jwt_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
